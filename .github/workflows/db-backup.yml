name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          
      - name: Verify pg_dump version
        run: /usr/lib/postgresql/17/bin/pg_dump --version
      
      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Error: DATABASE_URL secret is not set in repository settings."
            exit 1
          fi
          DATE=$(date +%Y-%m-%d)
          echo "Creating backup for $DATE..."
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" -F c -f backup-$DATE.dump
          ls -lh backup-$DATE.dump
          echo "Backup created successfully"
      
      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup-*.dump
          retention-days: 30
