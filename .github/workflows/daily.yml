name: Daily TeenCivics Bill Posting

on:
  schedule:
    # Morning scan: 9:00 AM EDT = 1:00 PM UTC (13:00 UTC) during summer
    # Note: During EST (winter), this runs at 8:00 AM ET
    - cron: '0 13 * * *'
    # Evening scan: 10:30 PM EDT = 2:30 AM UTC next day (02:30 UTC) during summer
    # Note: During EST (winter), this runs at 9:30 PM ET
    - cron: '30 2 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  post-bill:
    runs-on: ubuntu-latest
    
    services:
      # Start PostgreSQL for database operations
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: teencivics_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install PostgreSQL driver
        pip install psycopg2-binary
        # Install timezone support
        pip install pytz

    - name: Setup environment variables
      run: |
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/teencivics_test" >> $GITHUB_ENV
        echo "TESTING=false" >> $GITHUB_ENV

    - name: Initialize database
      run: |
        python -c "
        from src.load_env import load_env
        from src.database.db import init_db
        load_env()
        init_db()
        print('Database initialized successfully')
        "

    - name: Run daily bill posting
      env:
        CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
        TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
        TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/teencivics_test
      run: |
        echo "🚀 Starting daily bill posting workflow"
        echo "⏰ Current UTC time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        echo "⏰ Current ET time: $(TZ='America/New_York' date '+%Y-%m-%d %I:%M:%S %p ET')"
        
        # Determine which scan this is
        HOUR_ET=$(TZ='America/New_York' date '+%H')
        if [ "$HOUR_ET" -ge 8 ] && [ "$HOUR_ET" -lt 12 ]; then
          echo "☀️ Running MORNING scan (9 AM ET)"
        elif [ "$HOUR_ET" -ge 21 ] || [ "$HOUR_ET" -lt 2 ]; then
          echo "🌙 Running EVENING scan (10:30 PM ET)"
        else
          echo "🔧 Running MANUAL scan"
        fi
        
        # Run the orchestrator
        python src/orchestrator.py
        
        EXIT_CODE=$?
        if [ $EXIT_CODE -eq 0 ]; then
          echo "✅ Daily bill posting completed successfully"
        else
          echo "❌ Daily bill posting failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi

    - name: Archive logs (if exists)
      if: always()
      run: |
        if [ -f orchestrator.log ]; then
          echo "📋 Archiving orchestrator log..."
          cp orchestrator.log orchestrator_$(date +%Y%m%d_%H%M%S).log
        fi