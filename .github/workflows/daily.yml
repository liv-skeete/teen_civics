name: Daily TeenCivics Bill Processing (Feed-Based)

on:
  schedule:
    - cron: '0 12 * * *'  # Run at 12:00 UTC (8:00 AM ET) every day
  workflow_dispatch:  # Allow manual triggering

concurrency:
  group: teencivics-daily-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ping-database:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psycopg2-binary python-dotenv

    - name: Ping Supabase database
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        python scripts/ping_database.py

    - name: Run database migration (if needed)
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        python scripts/migrate_database_schema.py

  daily-bill-processing:
    needs: ping-database
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install psycopg2-binary
        pip install -e .

    - name: Run daily orchestrator
      # The ${{ secrets.SECRET_NAME }} syntax is the standard, secure way to access secrets in GitHub Actions.
      # Linter warnings about invalid context access can be safely ignored.
      env:
        CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        ANTHROPIC_MODEL_PREFERRED: claude-3-5-sonnet-20241022
        ANTHROPIC_MODEL_FALLBACK: claude-3-5-sonnet-20240620
        ANTHROPIC_MODEL_SECOND_FALLBACK: claude-3-5-haiku-20241022
        TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
        TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
        TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        python src/orchestrator.py

    - name: Archive logs if exists
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: orchestrator-logs
        path: orchestrator*.log
        if-no-files-found: ignore