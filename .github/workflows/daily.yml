name: Daily TeenCivics Post

on:
  schedule:
    - cron: '0 8 * * *'  # Run at 8:00 AM UTC daily
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write

jobs:
  daily-post:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Debug secrets presence
      env:
        CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY || secrets.CONGRESS_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
        TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
        TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
      run: |
        python - <<'PY'
        import os
        def m(v):
            return (v[:4]+'***'+v[-4:]) if v and len(v)>=8 else ('set' if v else 'missing')
        keys = ['CONGRESS_API_KEY','ANTHROPIC_API_KEY','TWITTER_API_KEY','TWITTER_API_SECRET','TWITTER_ACCESS_TOKEN','TWITTER_ACCESS_SECRET','TWITTER_BEARER_TOKEN']
        for k in keys:
            print(f"{k}: {m(os.getenv(k))}")
        PY

    - name: Run daily post
      env:
        CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY || secrets.CONGRESS_GOV_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
        TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
        TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
      run: |
        python -m src.orchestrator